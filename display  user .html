<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }
        th {
            background: #ffc107;
        }
    </style>
</head>
<body>

<h2>Registered Students</h2>

<table>
<tr>
<th>Name</th>
<th>Gender</th>
<th>Course</th>
<th>College</th>
<th>Email</th>
<th>City</th>
</tr>

<tbody id="data"></tbody>
</table>

<br>
<a href="C:\Users\ANIKET\Downloads\wad practiles\practile no 2\Registration Page.html">Back</a>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let table = document.getElementById("data");

students.forEach(s => {
    let row = `
    <tr>
        <td>${s.fname} ${s.lname}</td>
        <td>${s.gender}</td>
        <td>${s.course}</td>
        <td>${s.college}</td>
        <td>${s.email}</td>
        <td>${s.city}</td>
    </tr>
    `;
    table.innerHTML += row;
});
</script>

</body>
</html>

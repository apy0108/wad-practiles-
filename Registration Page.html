<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        .section {
            margin-bottom: 25px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .row input,
        .row select {
            flex: 1;
            padding: 10px;
        }

        /* Full width inputs */
        .full {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        /* Gender alignment */
        .gender-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .gender-row label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button {
            padding: 10px 20px;
            background: #ffc107;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }

        a {
            margin-left: 15px;
        }
    </style>
</head>

<body>

<div class="container">
<h2>STUDENT REGISTRATION FORM</h2>

<form id="form">

<!-- Personal Details -->
<div class="section">
<h3>Personal Details</h3>

<div class="row">
    <input type="text" id="fname" placeholder="First Name" required>
    <input type="text" id="lname" placeholder="Last Name" required>
</div>

<div class="row">
    <input type="text" id="mother" placeholder="Mother Name">
    <input type="text" id="father" placeholder="Father Name">
</div>

<div class="gender-row">
    <strong>Gender:</strong>
    <label><input type="radio" name="gender" value="Male"> Male</label>
    <label><input type="radio" name="gender" value="Female"> Female</label>
    <label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<input type="date" id="dob" class="full">

</div>

<!-- Address -->
<div class="section">
<h3>Address Details</h3>

<input type="text" id="address" class="full" placeholder="Address">

<div class="row">
    <input type="text" id="state" placeholder="State">
    <input type="text" id="city" placeholder="City">
</div>

<input type="text" id="pincode" class="full" placeholder="Pincode">

</div>

<!-- Academic -->
<div class="section">
<h3>Academic Details</h3>

<div class="row">
    <input type="text" id="course" placeholder="Course">
    <input type="text" id="college" placeholder="College Name">
</div>

<div class="row">
    <input type="number" id="marks" placeholder="Previous %">
    <input type="number" id="year" placeholder="Passing Year">
</div>

</div>

<!-- Account -->
<div class="section">
<h3>Account Details</h3>

<div class="row">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
</div>

</div>

<button type="submit">Submit</button>
<a href="C:\Users\ANIKET\Downloads\wad practiles\practile no 2\display  user .html">View Data</a>

</form>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let gender = document.querySelector('input[name="gender"]:checked')?.value;

    let data = {
        fname: fname.value,
        lname: lname.value,
        mother: mother.value,
        father: father.value,
        gender: gender,
        dob: dob.value,
        address: address.value,
        state: state.value,
        city: city.value,
        pincode: pincode.value,
        course: course.value,
        college: college.value,
        marks: marks.value,
        year: year.value,
        email: email.value,
        password: password.value
    };

    // AJAX POST
    let xhr = new XMLHttpRequest();
    xhr.open("POST", "https://jsonplaceholder.typicode.com/posts", true);
    xhr.setRequestHeader("Content-Type", "application/json");

    xhr.onload = function(){
        if(xhr.status === 201){
            let users = JSON.parse(localStorage.getItem("students")) || [];
            users.push(data);
            localStorage.setItem("students", JSON.stringify(users));

            alert("Registered Successfully");
            form.reset();
        }
    };

    xhr.send(JSON.stringify(data));
});
</script>

</body>
</html>
